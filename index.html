<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado de Diagnóstico Pulmonar Avançado</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --success: #22c55e; --error: #ef4444; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: var(--card); width: 100%; max-width: 600px; padding: 2rem; border-radius: 24px; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .progress-bar { height: 10px; background: #e2e8f0; border-radius: 10px; margin-bottom: 1.5rem; overflow: hidden; }
        #progress { height: 100%; background: var(--primary); width: 0%; transition: width 0.4s ease; }
        .case-box { background: #f1f5f9; border-left: 5px solid var(--primary); padding: 18px; border-radius: 8px; margin-bottom: 1.5rem; }
        .case-title { font-weight: bold; color: var(--primary); display: block; margin-bottom: 8px; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        .audio-section { text-align: center; margin-bottom: 1.5rem; background: #eef2ff; padding: 15px; border-radius: 12px; }
        .audio-btn { width: 65px; height: 65px; background: var(--primary); border: none; border-radius: 50%; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .audio-btn:hover { transform: scale(1.1); background: #4338ca; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .option { padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; background: white; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: 0.2s; }
        .option:hover:not(:disabled) { border-color: var(--primary); background: #f8fafc; }
        .correct { background: #dcfce7 !important; border-color: var(--success) !important; color: #166534 !important; }
        .wrong { background: #fee2e2 !important; border-color: var(--error) !important; color: #991b1b !important; }
        .hidden { display: none; }
        .btn-next { margin-top: 1.5rem; width: 100%; padding: 16px; background: #1e293b; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .feedback { margin-top: 15px; font-weight: bold; text-align: center; min-height: 1.5rem; font-size: 0.9rem; }
        @media (max-width: 500px) { .options-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="progress-bar"><div id="progress"></div></div>
    
    <div id="game-screen">
        <p id="question-count" style="text-align: center; font-weight: bold; color: #64748b; margin-bottom: 5px;"></p>
        <div id="case-description" class="case-box">
            <span class="case-title">Relatório de Exame Físico:</span>
            <div id="case-text" style="line-height: 1.6;"></div>
        </div>

        <div class="audio-section">
            <p style="font-size: 0.8rem; margin-bottom: 10px; color: #4f46e5; font-weight: bold;">AUSCULTA DO QUADRO:</p>
            <button class="audio-btn" onclick="playAudio()">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
            </button>
        </div>

        <audio id="audio-player"></audio>
        <div class="options-grid" id="options"></div>
        <div id="feedback" class="feedback"></div>
        <button id="next-btn" class="btn-next hidden" onclick="nextQuestion()">Verificar Próximo Paciente ➡️</button>
    </div>

    <div id="result-screen" class="hidden" style="text-align: center;">
        <h2 style="font-size: 2rem;">Simulado Concluído</h2>
        <p id="score-text" style="font-size: 1.3rem; margin-bottom: 2rem; color: #475569;"></p>
        <button class="btn-next" onclick="location.reload()">Refazer Simulado Completo</button>
    </div>
</div>

<script>
    const database = [
        {
            disease: 'Condensação (Pneumonia)',
            audio: 'estertor fino.m4a',
            observations: [
                'Expansibilidade reduzida. FTV aumentado. Macicez à percussão.',
                'Substituição do ar alveolar por exsudato. Broncofonia presente.',
                'Hepatização do parênquima. Percussão densa e FTV muito forte.'
            ]
        },
        {
            disease: 'Crise de Asma / DPOC',
            audio: 'SIBILO.m4a',
            observations: [
                'Tórax em tonel. Hipersonoridade à percussão. FTV diminuído.',
                'Uso de musculatura acessória. Expiração prolongada detectada.',
                'Aprisionamento de ar. Murmúrio vesicular reduzido globalmente.'
            ]
        },
        {
            disease: 'Derrame Pleural',
            audio: 'atrito pleural.m4a',
            observations: [
                'Líquido no espaço pleural. Macicez firme. FTV abolido na base.',
                'Sinal do menisco presente. Expansibilidade reduzida na base afetada.',
                'Dor pleurítica ao inspirar. Atrito inicial evoluindo para silêncio.'
            ]
        },
        {
            disease: 'Obstrução de Vias Superiores',
            audio: 'ESTRIDOR.m4a',
            observations: [
                'Ruído audível sem estetoscópio. Tiragem infraesternal presente.',
                'Dificuldade inspiratória severa. Edema de glote suspeito.',
                'Corpo estranho em vias aéreas altas. Angústia respiratória.'
            ]
        },
        {
            disease: 'Edema Pulmonar / Congestão',
            audio: 'estertor grosso.m4a',
            observations: [
                'Presença de secreção em grandes brônquios. Tosse produtiva.',
                'Bolhas que explodem no início da inspiração. Ruído bolhoso.',
                'Paciente com insuficiência cardíaca. Estertores em bases.'
            ]
        },
        {
            disease: 'Pneumotórax',
            audio: 'Murmurio_vesicular.m4a',
            observations: [
                'Timpanismo à percussão. FTV totalmente ausente. Assimetria.',
                'Ar no espaço pleural. Súbita dor torácica e MV abolido.',
                'Desvio da traqueia para o lado oposto ao colapso.'
            ]
        },
        {
            disease: 'Consolidação Brônquica',
            audio: 'SOM BRÔNQUICO.m4a',
            observations: [
                'Sons tubulares ouvidos em áreas periféricas. Consolidação extensa.',
                'Som alto e agudo onde deveria haver murmúrio vesicular.',
                'Fase expiratória tão longa quanto a inspiratória.'
            ]
        },
        {
            disease: 'Normalidade / Padrão Fisiológico',
            audio: 'SOM BRONCOVESICULAR.m4a',
            observations: [
                'Ausculta em região hilar e espaços interescápulo-vertebrais.',
                'Som de intensidade moderada. Transição entre sons traqueais e MV.',
                'Achado normal em regiões centrais do tórax adulto.'
            ]
        }
    ];

    let currentIdx = 0;
    let score = 0;
    let quizList = [];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function initQuiz() {
        // Cria a lista com cada caso aparecendo 3 vezes
        let pool = [];
        database.forEach(item => {
            pool.push({...item}, {...item}, {...item});
        });
        quizList = shuffle(pool);
        showQuestion();
    }

    function showQuestion() {
        const q = quizList[currentIdx];
        const randomObs = q.observations[Math.floor(Math.random() * q.observations.length)];
        
        document.getElementById('case-text').innerHTML = `<p>${randomObs}</p><strong>Qual o diagnóstico ou som predominante?</strong>`;
        const audioPlayer = document.getElementById('audio-player');
        audioPlayer.src = q.audio;
        audioPlayer.load();

        document.getElementById('feedback').innerText = '';
        document.getElementById('question-count').innerText = `Paciente ${currentIdx + 1} de ${quizList.length}`;
        document.getElementById('progress').style.width = `${((currentIdx + 1) / quizList.length) * 100}%`;
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';

        // Gera alternativas: a correta + 3 erradas aleatórias
        let choices = [q.disease];
        let others = database.filter(d => d.disease !== q.disease).map(d => d.disease);
        shuffle(others);
        choices.push(...others.slice(0, 3));
        shuffle(choices);

        choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = choice;
            btn.onclick = () => checkAnswer(choice, q.disease, btn);
            optionsDiv.appendChild(btn);
        });
        
        document.getElementById('next-btn').classList.add('hidden');
    }

    function playAudio() {
        const audio = document.getElementById('audio-player');
        audio.currentTime = 0;
        audio.play().catch(e => console.log("Aguardando interação do usuário."));
    }

    function checkAnswer(selected, correct, btn) {
        const allBtns = document.querySelectorAll('.option');
        allBtns.forEach(b => b.disabled = true);
        const feedback = document.getElementById('feedback');
        
        if (selected === correct) { 
            btn.classList.add('correct'); 
            feedback.innerHTML = '<span style="color:var(--success)">✅ Diagnóstico Preciso!</span>';
            score++; 
        } else { 
            btn.classList.add('wrong'); 
            feedback.innerHTML = `<span style="color:var(--error)">❌ Incorreto. O quadro sugere ${correct}.</span>`;
            allBtns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); }); 
        }
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < quizList.length) {
            showQuestion();
        } else {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('score-text').innerText = `Pontuação Final: ${score} de ${quizList.length} diagnósticos corretos.`;
        }
    }

    window.onload = initQuiz;
</script>
</body>
</html>

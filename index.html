<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado de Semiologia Pulmonar</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --success: #22c55e; --error: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: var(--card); width: 100%; max-width: 650px; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .screen { display: none; }
        .active { display: block; }
        h1, h2 { text-align: center; color: var(--primary); }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #4338ca; }
        .btn-retry { background: #6366f1; color: white; margin-top: 5px; }
        
        /* Estilo da Lista Inicial */
        .sound-list { background: #f1f5f9; padding: 15px; border-radius: 10px; margin: 20px 0; }
        .sound-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-size: 0.9rem; 
            padding: 8px 0; 
            border-bottom: 1px solid #e2e8f0; 
        }
        .sound-item:last-child { border-bottom: none; }
        
        .progress-bar { height: 8px; background: #e2e8f0; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        #progress { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }
        .case-box { background: #f8fafc; border-left: 4px solid var(--primary); padding: 15px; margin-bottom: 20px; font-size: 0.95rem; line-height: 1.5; text-align: justify; color: #334155; }
        .audio-btn { width: 60px; height: 60px; background: var(--primary); border: none; border-radius: 50%; cursor: pointer; display: block; margin: 0 auto 20px; }
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 1rem; margin-bottom: 10px; }
        .feedback-area { text-align: center; font-weight: bold; margin: 10px 0; min-height: 20px; }
        .hidden { display: none; }
        
        /* Estilo da Revisão */
        .result-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-radius: 8px; margin-bottom: 8px; background: #f8fafc; border: 1px solid #e2e8f0; }
        .mini-audio-btn { background: #e2e8f0; border: none; border-radius: 5px; padding: 5px 10px; cursor: pointer; font-size: 0.8rem; }
        .mini-audio-btn:hover { background: #cbd5e1; }
        .review-section { margin-top: 20px; }
        .tag { padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .tag-error { background: #fee2e2; color: #ef4444; }
        .tag-success { background: #dcfce7; color: #22c55e; }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen" class="screen active">
        <h1>Simulado de Ausculta</h1>
        <p style="text-align: center;">Estude os sons abaixo antes de começar:</p>
        <div class="sound-list" id="initial-list"></div>
        <button class="btn btn-primary" onclick="startQuiz(false)">Começar Simulado Completo</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="progress-bar"><div id="progress"></div></div>
        <p id="q-counter" style="text-align:center; font-size: 0.8rem; font-weight: bold;"></p>
        <div class="case-box" id="case-text"></div>
        <button class="audio-btn" onclick="playCurrentAudio()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <audio id="main-audio" preload="auto"></audio>
        <input type="text" id="user-answer" placeholder="Digite o nome do som..." autocomplete="off">
        <div id="feedback" class="feedback-area"></div>
        <button id="check-btn" class="btn btn-primary" onclick="checkAnswer()">Conferir Resposta</button>
        <button id="next-btn" class="btn btn-primary hidden" style="background:#1e293b" onclick="nextQuestion()">Próximo Caso ➡️</button>
    </div>

    <div id="result-screen" class="screen">
        <h2>Resultado Final</h2>
        <p id="final-score" style="text-align:center; font-weight:bold; font-size: 1.2rem;"></p>
        
        <div id="results-review" class="review-section"></div>
        
        <div id="action-buttons">
            <button id="retry-errors-btn" class="btn btn-retry hidden" onclick="startQuiz(true)">Revisar Apenas Erros 🔄</button>
            <button class="btn btn-primary" onclick="location.reload()">Voltar ao Início</button>
        </div>
    </div>
</div>

<script>
    const database = [
        { name: 'Estertor Fino', file: 'estertor fino.m4a', contexts: ['Paciente de 70 anos com insuficiência cardíaca descompensada...', 'Homem de 50 anos com febre de 39°C e expectoração herrugeante...', 'Mulher de 65 anos com queixa de dispneia progressiva e baqueteamento digital.'] },
        { name: 'Sibilo', file: 'SIBILO.m4a', contexts: ['Paciente de 12 anos com taquipneia e uso de musculatura acessória...', 'Homem de 58 anos, tabagista crônico, apresenta-se com tórax em tonel...', 'Paciente jovem com queixa de "aperto no peito" após contato com animais.'] },
        { name: 'Atrito Pleural', file: 'atrito pleural.m4a', contexts: ['Paciente de 28 anos com dor torácica que piora na inspiração profunda...', 'Homem com dor pleurítica súbita que desaparece em apneia...', 'Paciente com lúpus apresenta desconforto respiratório e dor aguda lateral.'] },
        { name: 'Estridor', file: 'ESTRIDOR.m4a', contexts: ['Criança de 2 anos com episódio súbito de engasgo e cianose...', 'Paciente de 20 anos com anafilaxia e grande esforço respiratório cervical...', 'Idoso com câncer de esôfago e dificuldade respiratória em decúbito dorsal.'] },
        { name: 'Murmúrio Vesicular', file: 'Murmurio_vesicular.m4a', contexts: ['Estudante de 22 anos em exame físico admissional. Pulmão saudável...', 'Paciente assintomático em avaliação pré-operatória. FTV normal...', 'Avaliação de parênquima íntegro em aula prática de semiologia.'] },
        { name: 'Estertor Grosso', file: 'estertor grosso.m4a', contexts: ['Paciente com bronquiectasias e frêmito brônquico à palpação...', 'Idoso acamado com pneumonia e grande quantidade de secreção central...', 'Paciente com edema agudo de pulmão e expectoração espumosa rosada.'] },
        { name: 'Som Brônquico', file: 'SOM BRÔNQUICO.m4a', contexts: ['Ausculta sobre a região da traqueia em indivíduo normal.', 'Paciente com pneumonia extensa e consolidação de lobo superior.', 'Grande caverna tuberculosa em ápice pulmonar comunicada com brônquio.'] },
        { name: 'Som Broncovesicular', file: 'SOM BRONCOVESICULAR.m4a', contexts: ['Ausculta na região esternal superior e 2º espaço intercostal.', 'Avaliação da região interescapular de um adulto jovem hígido.', 'Médico avalia a região hilar anterior de um paciente sem queixas.'] }
    ];

    let quizList = [];
    let currentIdx = 0;
    let score = 0;
    let history = [];

    // Preencher a lista inicial com botões de áudio
    const initialListDiv = document.getElementById('initial-list');
    database.forEach(s => {
        const div = document.createElement('div');
        div.className = 'sound-item';
        div.innerHTML = `
            <span>• <strong>${s.name}</strong></span>
            <button class="mini-audio-btn" onclick="playReviewAudio('${s.file}')">🎧 Ouvir</button>
        `;
        initialListDiv.appendChild(div);
    });

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function normalize(str) {
        return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
    }

    function playReviewAudio(file) {
        const audio = new Audio(file);
        audio.play();
    }

    function startQuiz(onlyErrors = false) {
        if (onlyErrors) {
            // Filtra o banco de dados apenas com o que o usuário errou
            quizList = shuffle(history.filter(h => !h.isCorrect).map(h => ({name: h.name, file: h.file, ctx: h.ctx})));
        } else {
            let pool = [];
            database.forEach(s => {
                s.contexts.forEach(ctx => pool.push({name: s.name, file: s.file, ctx: ctx}));
            });
            quizList = shuffle(pool);
        }

        currentIdx = 0;
        score = 0;
        history = [];
        
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('result-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        showQuestion();
    }

    function showQuestion() {
        const q = quizList[currentIdx];
        document.getElementById('case-text').innerText = q.ctx;
        
        const audioTag = document.getElementById('main-audio');
        audioTag.src = q.file;
        audioTag.load();

        document.getElementById('user-answer').value = '';
        document.getElementById('user-answer').disabled = false;
        document.getElementById('feedback').innerText = '';
        document.getElementById('check-btn').classList.remove('hidden');
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('q-counter').innerText = `QUESTÃO ${currentIdx + 1} DE ${quizList.length}`;
        document.getElementById('progress').style.width = `${((currentIdx + 1) / quizList.length) * 100}%`;
    }

    function playCurrentAudio() {
        const audio = document.getElementById('main-audio');
        audio.currentTime = 0;
        audio.play().catch(e => alert("Erro ao tocar áudio. Verifique os arquivos."));
    }

    function checkAnswer() {
        const q = quizList[currentIdx];
        const userAns = document.getElementById('user-answer').value;
        const isCorrect = normalize(userAns) === normalize(q.name);
        
        document.getElementById('user-answer').disabled = true;
        document.getElementById('check-btn').classList.add('hidden');
        document.getElementById('next-btn').classList.remove('hidden');

        const feedback = document.getElementById('feedback');
        if(isCorrect) {
            feedback.innerHTML = `<span style="color:var(--success)">✅ Correto!</span>`;
            score++;
        } else {
            feedback.innerHTML = `<span style="color:var(--error)">❌ Incorreto. O som é: ${q.name}</span>`;
        }
        history.push({ ...q, userAns, isCorrect });
    }

    function nextQuestion() {
        currentIdx++;
        if(currentIdx < quizList.length) showQuestion();
        else showFinalResults();
    }

    function showFinalResults() {
        document.getElementById('game-screen').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');
        document.getElementById('final-score').innerText = `Você acertou ${score} de ${quizList.length}`;
        
        const reviewDiv = document.getElementById('results-review');
        reviewDiv.innerHTML = '<h3>Revisão de Desempenho:</h3>';
        
        history.forEach((item) => {
            const div = document.createElement('div');
            div.className = 'result-item';
            div.innerHTML = `
                <div>
                    <span class="tag ${item.isCorrect ? 'tag-success' : 'tag-error'}">${item.isCorrect ? 'Acerto' : 'Erro'}</span>
                    <div style="font-size:0.85rem; margin-top:5px;"><strong>Som:</strong> ${item.name}</div>
                    ${!item.isCorrect ? `<div style="font-size:0.75rem; color:gray">Sua resposta: ${item.userAns || "(vazio)"}</div>` : ''}
                </div>
                <button class="mini-audio-btn" onclick="playReviewAudio('${item.file}')">▶️ Ouvir</button>
            `;
            reviewDiv.appendChild(div);
        });

        // Mostrar botão de revisar erros se houver erros
        const hasErrors = history.some(h => !h.isCorrect);
        const retryBtn = document.getElementById('retry-errors-btn');
        if(hasErrors) {
            retryBtn.classList.remove('hidden');
        } else {
            retryBtn.classList.add('hidden');
        }
    }
</script>
</body>
</html>

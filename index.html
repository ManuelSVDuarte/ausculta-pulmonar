    <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treino de Ausculta Pulmonar</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --success: #22c55e; --error: #ef4444; }
        body { font-family: sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: var(--card); width: 100%; max-width: 450px; padding: 2.5rem; border-radius: 24px; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); text-align: center; }
        .progress-bar { height: 8px; background: #e2e8f0; border-radius: 10px; margin-bottom: 2rem; overflow: hidden; }
        #progress { height: 100%; background: var(--primary); width: 0%; transition: width 0.4s ease; }
        .audio-btn { width: 100px; height: 100px; background: var(--primary); border: none; border-radius: 50%; cursor: pointer; margin: 1.5rem 0; display: inline-flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4); }
        .audio-btn:hover { transform: scale(1.05); }
        .options-grid { display: grid; gap: 12px; margin-top: 1.5rem; }
        .option { padding: 15px; border: 2px solid #e2e8f0; border-radius: 14px; background: none; cursor: pointer; font-weight: 600; text-align: left; transition: 0.2s; }
        .option:hover:not(:disabled) { border-color: var(--primary); background: #f1f5f9; }
        .correct { background: #dcfce7 !important; border-color: var(--success) !important; color: #166534 !important; }
        .wrong { background: #fee2e2 !important; border-color: var(--error) !important; color: #991b1b !important; }
        .hidden { display: none; }
        .btn-next { margin-top: 2rem; width: 100%; padding: 16px; background: #1e293b; color: white; border: none; border-radius: 14px; cursor: pointer; font-weight: bold; }
        h2 { margin: 0 0 0.5rem 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="progress-bar"><div id="progress"></div></div>
    <div id="game-screen">
        <p id="question-count">Carregando...</p>
        <h2>Qual som é este?</h2>
        <button class="audio-btn" onclick="playAudio()">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <audio id="audio-player"></audio>
        <div class="options-grid" id="options"></div>
        <button id="next-btn" class="btn-next hidden" onclick="nextQuestion()">Próxima Ausculta ➡️</button>
    </div>
    <div id="result-screen" class="hidden">
        <h2>Treino Concluído</h2>
        <p id="score-text"></p>
        <button class="btn-next" onclick="location.reload()">Refazer Treino</button>
    </div>
</div>

<script>
    const baseSounds = [
        { file: 'atrito pleural.m4a', name: 'Atrito Pleural' },
        { file: 'estertor grosso.m4a', name: 'Estertor Grosso' },
        { file: 'estertor fino.m4a', name: 'Estertor Fino' },
        { file: 'ESTRIDOR.m4a', name: 'Estridor' },
        { file: 'SIBILO.m4a', name: 'Sibilo' },
        { file: 'SOM BRONCOVESICULAR.m4a', name: 'Som Broncovesicular' },
        { file: 'SOM BRÔNQUICO.m4a', name: 'Som Brônquico' },
        { file: 'Murmurio_vesicular.m4a', name: 'Murmúrio Vesicular' }
    ];

    let currentIdx = 0;
    let score = 0;
    let quizList = [];

    // Função para embaralhar qualquer array (Fisher-Yates)
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function initQuiz() {
        // 1. Repete a lista 3 vezes
        quizList = [...baseSounds, ...baseSounds, ...baseSounds];
        
        // 2. Embaralha a lista completa
        shuffle(quizList);
        
        showQuestion();
    }

    function showQuestion() {
        const q = quizList[currentIdx];
        const audio = document.getElementById('audio-player');
        audio.src = q.file;
        audio.load();
        
        // Atualiza contadores
        const total = quizList.length;
        document.getElementById('question-count').innerText = `Questão ${currentIdx + 1} de ${total}`;
        document.getElementById('progress').style.width = `${((currentIdx + 1) / total) * 100}%`;
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';

        // Cria alternativas (1 correta + 3 erradas aleatórias)
        let choices = [q.name];
        let wrongOptions = baseSounds
            .filter(s => s.name !== q.name)
            .map(s => s.name);
        
        shuffle(wrongOptions);
        choices.push(...wrongOptions.slice(0, 3));
        
        // Embaralha a ordem das alternativas
        shuffle(choices);

        choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = choice;
            btn.onclick = () => checkAnswer(choice, q.name, btn);
            optionsDiv.appendChild(btn);
        });
        
        document.getElementById('next-btn').classList.add('hidden');
    }

    function playAudio() {
        const audio = document.getElementById('audio-player');
        audio.currentTime = 0;
        audio.play().catch(e => {
            console.error("Erro ao tocar áudio:", e);
        });
    }

    function checkAnswer(selected, correct, btn) {
        const allBtns = document.querySelectorAll('.option');
        allBtns.forEach(b => b.disabled = true);
        
        if (selected === correct) { 
            btn.classList.add('correct'); 
            score++; 
        } else { 
            btn.classList.add('wrong'); 
            allBtns.forEach(b => { 
                if(b.innerText === correct) b.classList.add('correct'); 
            }); 
        }
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < quizList.length) {
            showQuestion();
        } else {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('score-text').innerText = `Você acertou ${score} de ${quizList.length}!`;
        }
    }

    window.onload = initQuiz;
</script>
</body>
</html>

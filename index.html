<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado: Identificação de Sons Pulmonares</title>
    <style>
        :root { --primary: #6366f1; --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; --success: #10b981; --error: #f43f5e; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: var(--card); width: 100%; max-width: 550px; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .progress-bar { height: 6px; background: #e2e8f0; border-radius: 10px; margin-bottom: 2rem; overflow: hidden; }
        #progress { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }
        .case-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 12px; margin-bottom: 1.5rem; position: relative; }
        .case-tag { position: absolute; top: -10px; left: 20px; background: var(--primary); color: white; padding: 2px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; }
        .audio-btn { width: 60px; height: 60px; background: var(--primary); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; transition: 0.2s; }
        .audio-btn:hover { transform: scale(1.1); filter: brightness(1.1); }
        .options-grid { display: grid; gap: 10px; }
        .option { padding: 14px; border: 2px solid #e2e8f0; border-radius: 10px; background: white; cursor: pointer; font-weight: 500; transition: 0.2s; text-align: left; }
        .option:hover:not(:disabled) { border-color: var(--primary); background: #fdf2f8; }
        .correct { background: #ecfdf5 !important; border-color: var(--success) !important; color: #065f46 !important; }
        .wrong { background: #fff1f2 !important; border-color: var(--error) !important; color: #9f1239 !important; }
        .hidden { display: none; }
        .btn-next { margin-top: 1.5rem; width: 100%; padding: 15px; background: #0f172a; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .feedback { text-align: center; margin-top: 15px; font-weight: bold; min-height: 1.2rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="progress-bar"><div id="progress"></div></div>
    
    <div id="game-screen">
        <p id="counter" style="text-align: center; font-size: 0.8rem; color: #64748b; margin-bottom: 1rem;"></p>
        
        <div class="case-card">
            <span class="case-tag">CASO CLÍNICO</span>
            <p id="case-text" style="margin: 0; line-height: 1.5; font-size: 0.95rem;"></p>
        </div>

        <button class="audio-btn" onclick="playAudio()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
        </button>

        <audio id="player"></audio>
        <div class="options-grid" id="options"></div>
        <div id="feedback" class="feedback"></div>
        <button id="next-btn" class="btn-next hidden" onclick="nextQuestion()">Próximo Paciente ➡️</button>
    </div>

    <div id="result-screen" class="hidden" style="text-align: center;">
        <h2>Avaliação Finalizada</h2>
        <p id="score-text" style="font-size: 1.2rem;"></p>
        <button class="btn-next" onclick="location.reload()">Reiniciar Simulado</button>
    </div>
</div>

<script>
    const soundData = [
        {
            name: 'Estertor Fino',
            file: 'estertor fino.m4a',
            contexts: [
                'Paciente com febre e tosse produtiva. Ao exame: expansibilidade reduzida, FTV aumentado e macicez à percussão.',
                'Quadro de pneumonia lobar em fase de hepatização. O som é agudo e ouvido ao final da inspiração.',
                'Paciente apresenta condensação pulmonar. Na percussão nota-se macicez por substituição do ar por exsudato.'
            ]
        },
        {
            name: 'Sibilo',
            file: 'SIBILO.m4a',
            contexts: [
                'Paciente asmático com dispneia. Apresenta tórax em tonel, uso de musculatura acessória e expiração prolongada.',
                'Crise de DPOC com aprisionamento de ar. Percussão revela hipersonoridade e FTV reduzido simetricamente.',
                'Paciente com obstrução de vias aéreas inferiores. Nota-se redução do fluxo efetivo de ar e tempo expiratório aumentado.'
            ]
        },
        {
            name: 'Atrito Pleural',
            file: 'atrito pleural.m4a',
            contexts: [
                'Paciente com dor torácica ventilatório-dependente. Há acúmulo de líquido no espaço pleural e FTV reduzido.',
                'Quadro inicial de pleurite. À inspeção, nota-se postura antálgica e expansibilidade diminuída no lado afetado.',
                'Derrame pleural em fase inflamatória. Há macicez à percussão e sinal do menisco em exames de imagem.'
            ]
        },
        {
            name: 'Estridor',
            file: 'ESTRIDOR.m4a',
            contexts: [
                'Criança com obstrução de vias aéreas superiores por corpo estranho. Som intenso ouvido predominantemente na inspiração.',
                'Paciente com edema de glote pós-reação alérgica. Apresenta tiragem infraesternal e ruído de alta frequência audível sem estetoscópio.',
                'Quadro de laringite aguda. O fluxo de ar está severamente limitado na região da laringe/traqueia.'
            ]
        },
        {
            name: 'Murmúrio Vesicular',
            file: 'Murmurio_vesicular.m4a',
            contexts: [
                'Exame de rotina em paciente saudável. Som suave ouvido em quase toda a periferia pulmonar, sem ruídos adventícios.',
                'Paciente em pós-operatório com ventilação preservada. Inspiração mais longa e audível que a expiração.',
                'Avaliação pulmonar normal. O som representa a entrada de ar nos alvéolos sem obstruções ou secreções.'
            ]
        },
        {
            name: 'Estertor Grosso',
            file: 'estertor grosso.m4a',
            contexts: [
                'Paciente com bronquiectasia e grande acúmulo de secreção em vias aéreas de grande calibre. Som bolhoso.',
                'Idoso com insuficiência cardíaca congestiva e edema pulmonar. Som altera-se com a tosse.',
                'Quadro de bronquite crônica com hipersecreção de muco. Som ouvido em ambas as fases respiratórias.'
            ]
        },
        {
            name: 'Som Brônquico',
            file: 'SOM BRÔNQUICO.m4a',
            contexts: [
                'Ausculta sobre a traqueia em paciente normal, ou em periferia no caso de consolidação pulmonar severa.',
                'Som tubular com fase expiratória forte e prolongada. Representa a condução do ar através de brônquios calibrosos.',
                'Paciente com grande área de condensação. O som brônquico é transmitido para a parede torácica devido à densidade do tecido.'
            ]
        },
        {
            name: 'Som Broncovesicular',
            file: 'SOM BRONCOVESICULAR.m4a',
            contexts: [
                'Som de intensidade moderada ouvido na região esternal superior e interescapular.',
                'Representa a superposição dos sons traqueais com o murmúrio alveolar. Encontrado em áreas de bifurcação brônquica.',
                'Ausculta normal em regiões hilares. As fases inspiratória e expiratória têm durações semelhantes.'
            ]
        }
    ];

    let quizList = [];
    let currentIdx = 0;
    let score = 0;

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function init() {
        // Multiplica por 3 repetições
        let pool = [];
        soundData.forEach(s => {
            pool.push({...s, contextIdx: 0}, {...s, contextIdx: 1}, {...s, contextIdx: 2});
        });
        quizList = shuffle(pool);
        showQuestion();
    }

    function showQuestion() {
        const q = quizList[currentIdx];
        document.getElementById('case-text').innerText = q.contexts[q.contextIdx];
        document.getElementById('player').src = q.file;
        document.getElementById('feedback').innerText = '';
        document.getElementById('next-btn').classList.add('hidden');
        
        const total = quizList.length;
        document.getElementById('counter').innerText = `PACIENTE ${currentIdx + 1} / ${total}`;
        document.getElementById('progress').style.width = `${((currentIdx + 1) / total) * 100}%`;

        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';

        let choices = shuffle([q.name, ...shuffle(soundData.filter(s => s.name !== q.name).map(s => s.name)).slice(0, 3)]);

        choices.forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = c;
            btn.onclick = () => check(c, q.name, btn);
            optionsDiv.appendChild(btn);
        });
    }

    function playAudio() {
        const a = document.getElementById('player');
        a.currentTime = 0;
        a.play();
    }

    function check(selected, correct, btn) {
        const btns = document.querySelectorAll('.option');
        btns.forEach(b => b.disabled = true);
        
        if(selected === correct) {
            btn.classList.add('correct');
            document.getElementById('feedback').innerHTML = "✅ Correto!";
            score++;
        } else {
            btn.classList.add('wrong');
            document.getElementById('feedback').innerHTML = `❌ Incorreto. O som é ${correct}.`;
            btns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
        }
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
        currentIdx++;
        if(currentIdx < quizList.length) showQuestion();
        else {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('score-text').innerText = `Você identificou corretamente ${score} de ${quizList.length} sons!`;
        }
    }

    window.onload = init;
</script>
</body>
</html>

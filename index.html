<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz de Ausculta Pulmonar</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card);
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            border-radius: 24px;
            shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            text-align: center;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        .progress-bar {
            height: 6px;
            background: #e2e8f0;
            border-radius: 10px;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        #progress {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.4s ease;
        }

        .audio-btn {
            width: 100px;
            height: 100px;
            background: var(--primary);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            margin: 1.5rem 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
        }

        .audio-btn:active { transform: scale(0.95); }

        .options-grid {
            display: grid;
            gap: 12px;
            margin-top: 2rem;
        }

        .option {
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            color: #475569;
            transition: all 0.2s;
        }

        .option:hover:not(:disabled) {
            border-color: var(--primary);
            background: #f5f3ff;
        }

        .correct { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534; }
        .wrong { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; }

        .hidden { display: none; }
        
        #next-btn {
            margin-top: 1.5rem;
            width: 100%;
            padding: 12px;
            background: #1e293b;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        h2 { margin-bottom: 0.5rem; }
        p { color: #64748b; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container" id="quiz-container">
    <div class="progress-bar"><div id="progress"></div></div>
    
    <div id="game">
        <p id="question-count">Questão 1 de 6</p>
        <h2>O que você ouve?</h2>
        
        <button class="audio-btn" onclick="playAudio()">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
        </button>
        
        <audio id="audio-player"></audio>

        <div class="options-grid" id="options"></div>
        <button id="next-btn" class="hidden" onclick="nextQuestion()">Próxima Questão</button>
    </div>

    <div id="result" class="hidden">
        <h1 style="font-size: 4rem; margin: 0;">🎉</h1>
        <h2>Fim do Treino!</h2>
        <p id="score-text"></p>
        <button id="next-btn" onclick="location.reload()">Reiniciar</button>
    </div>
</div>

<script>
    const sounds = [
        { file: 'Estertor grosso (bolhoso).wav', name: 'Estertor grosso (bolhoso)' },
        { file: 'Estertor fino (crepitação).wav', name: 'Estertor fino (crepitação)' },
        { file: 'ronco.wav', name: 'Ronco' },
        { file: 'Murmurio vesicular.wav', name: 'Murmúrio vesicular' },
        { file: 'estridor.wav', name: 'Estridor' },
        { file: 'sibilo.wav', name: 'Sibilo' }
    ];

    let currentIdx = 0;
    let score = 0;
    let shuffledSounds = [];

    function initQuiz() {
        shuffledSounds = [...sounds].sort(() => Math.random() - 0.5);
        showQuestion();
    }

    function showQuestion() {
        const q = shuffledSounds[currentIdx];
        document.getElementById('audio-player').src = q.file;
        document.getElementById('question-count').innerText = `Questão ${currentIdx + 1} de ${sounds.length}`;
        document.getElementById('progress').style.width = `${((currentIdx + 1) / sounds.length) * 100}%`;
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        
        const choices = [q.name, ...sounds.filter(s => s.name !== q.name)
            .sort(() => Math.random() - 0.5).slice(0, 3).map(s => s.name)]
            .sort(() => Math.random() - 0.5);

        choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = choice;
            btn.onclick = () => checkAnswer(choice, q.name, btn);
            optionsDiv.appendChild(btn);
        });
        
        document.getElementById('next-btn').classList.add('hidden');
    }

    function playAudio() {
        document.getElementById('audio-player').play();
    }

    function checkAnswer(selected, correct, btn) {
        const allBtns = document.querySelectorAll('.option');
        allBtns.forEach(b => b.disabled = true);
        
        if (selected === correct) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            allBtns.forEach(b => {
                if (b.innerText === correct) b.classList.add('correct');
            });
        }
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < sounds.length) {
            showQuestion();
        } else {
            document.getElementById('game').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('score-text').innerText = `Você acertou ${score} de ${sounds.length} sons pulmonares.`;
        }
    }

    initQuiz();
</script>
</body>
</html>
